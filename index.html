<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Milestone Dashboard &mdash; Upload</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="upload-screen">
    <div class="upload-card">
      <h1>Milestone Dashboard</h1>
      <div class="subtitle">Upload a Milestone Database CSV to get started</div>
      <label for="csvInput" class="dropzone" id="dropzone">
        <span id="dropzoneText">Click to choose a CSV file, or drag and drop it here</span>
        <input type="file" id="csvInput" accept=".csv,text/csv" hidden />
      </label>
      <div id="uploadError" class="upload-error"></div>
      <div class="upload-hint">Expected columns: IDs, Students, Year, Student status, Advisors, QE status, Proposal defense status, Thesis defense status, Thesis submission, English requirement, EC approval, Publications, Risk status</div>
    </div>
  </div>

<script src="shared.js"></script>
<script src="upload.js"></script>
</body>
</html>
